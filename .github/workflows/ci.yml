name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Run tests
      run: npm test

    - name: Smoke-test the CLI
      run: |
        node dist/src/cli.js generate examples/config.json --json > /dev/null
        node dist/src/cli.js sitemap examples/config.json --json > /dev/null
        node dist/src/cli.js route examples/lead.json --config examples/config.json --json > /dev/null
